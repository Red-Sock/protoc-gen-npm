syntax = "proto3";

package example_api;

import "npm.proto";

import "common_p.proto";

import "google/api/annotations.proto";

option go_package = "/example_api";
option (npm_package) = "@example/api";

service VelezAPI {
  rpc Version(Version.Request) returns (Version.Response) {
    option (google.api.http) = {
      get: "/api/version"
    };
  };

}

message Version {
  message Request {
    Empty emp = 1;
  }

  message Response {
    string version = 1;
  }
}
